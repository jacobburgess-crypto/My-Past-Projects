<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.CSS">
        <title>Contact List</title>
    </head>
    <body>
        <script src="contact.JS"></script>
        <form class="topLoggedIn"> 
            <table>
                <tr>
                    <th><input type="reset" value="reset">
            <input type="submit" value="submit" onclick="logContactList()"></th>
                    <th><label for="log_input_fAlN"> | <input id="log_input_fAlN" placeholder="Your First & Last Name" type="" value="" required></label></th>
                    <th><label for="log_input_email"> | <input id="log_input_email" placeholder="Email" type="email" value="" required></label></th>
                    <th><label for="log_input_phoneNumber"> | <input id="log_input_phoneNumber" placeholder="Phone Number" type="tel" value="" pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}" required></label></th>
                    <th><label for="log_input_birthDate"> | <input id="log_input_birthDate" placeholder="Date of Birth" type="date" value="" required></label></th>
                </tr>
            </table>
        </form>

        <button onclick="logContactList()">try it</button>
        <table id="log_output">
        </table>
